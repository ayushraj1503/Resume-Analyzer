<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Resume Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6eff;
    --accent2: #ff6e9c;
    --accent3: #6effc8;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,110,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,110,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { background: rgba(124,110,255,0.12); top: -200px; left: -100px; }
  .glow-2 { background: rgba(255,110,156,0.08); bottom: -200px; right: -100px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(124,110,255,0.1);
    border: 1px solid rgba(124,110,255,0.25);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  .badge::before { content: '◆'; font-size: 8px; }

  h1 {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }
  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 14px;
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 400;
    font-family: var(--mono);
  }

  /* Input section */
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media(max-width: 640px){ .input-grid { grid-template-columns: 1fr; } }

  .field {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  textarea {
    width: 100%;
    height: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,110,255,0.12);
  }
  textarea::placeholder { color: var(--muted); opacity: 0.5; }

  .btn {
    width: 100%;
    padding: 16px 32px;
    background: linear-gradient(135deg, var(--accent), #5a4de8);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 24px rgba(124,110,255,0.3);
  }
  .btn:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(124,110,255,0.4);
  }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loader */
  .loader { display: none; text-align: center; padding: 40px; }
  .loader.active { display: block; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader p { color: var(--muted); font-family: var(--mono); font-size: 13px; }

  /* Results */
  #results { display: none; margin-top: 40px; animation: fadeUp 0.5s ease; }
  #results.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .results-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
    padding: 28px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .score-ring {
    position: relative;
    width: 90px; height: 90px;
    flex-shrink: 0;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .score-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: var(--mono);
  }
  .score-num { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .score-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .score-summary h2 {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }
  .score-summary p {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
  }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 640px){ .cards { grid-template-columns: 1fr; } }
  .card-full { grid-column: 1 / -1; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(124,110,255,0.3); }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 14px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid;
  }
  .tag-green {
    color: var(--accent3);
    border-color: rgba(110,255,200,0.2);
    background: rgba(110,255,200,0.06);
  }

  .gap-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .gap-item:last-child { border-bottom: none; padding-bottom: 0; }
  .gap-top { display: flex; align-items: center; gap: 10px; }
  .gap-skill { font-weight: 600; font-size: 14px; }
  .importance {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.08em;
  }
  .imp-High { background: rgba(255,110,156,0.1); color: var(--accent2); border: 1px solid rgba(255,110,156,0.2); }
  .imp-Medium { background: rgba(255,200,80,0.1); color: #ffc850; border: 1px solid rgba(255,200,80,0.2); }
  .imp-Low { background: rgba(110,255,200,0.1); color: var(--accent3); border: 1px solid rgba(110,255,200,0.2); }
  .gap-suggestion { font-family: var(--mono); font-size: 12px; color: var(--muted); padding-left: 4px; }

  .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .bullet-list li {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
    padding-left: 20px;
    position: relative;
  }
  .bullet-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .error-msg {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 10px;
    padding: 14px 18px;
    color: #ff6060;
    font-family: var(--mono);
    font-size: 13px;
    display: none;
    margin-top: 16px;
  }
  .error-msg.active { display: block; }
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="container">
  <header>
    <div class="badge">Powered by GPT-4o-mini + FastAPI</div>
    <h1>AI <span>Resume</span><br/>Analyzer</h1>
    <p class="subtitle">// paste resume + JD → get structured insights in seconds</p>
  </header>

  <div class="input-grid">
    <div class="field">
      <label><span class="dot"></span> Your Resume</label>
      <textarea id="resumeInput" placeholder="Paste your full resume text here...&#10;&#10;Include work experience, skills, education, projects..."></textarea>
    </div>
    <div class="field">
      <label><span class="dot" style="background:var(--accent2)"></span> Job Description</label>
      <textarea id="jdInput" placeholder="Paste the full job description here...&#10;&#10;Include requirements, responsibilities, skills needed..."></textarea>
    </div>
  </div>

  <button class="btn" id="analyzeBtn" onclick="analyze()">
    <span id="btnIcon">⚡</span>
    <span id="btnText">Analyze Match</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Analyzing with AI... this takes ~5 seconds</p>
  </div>

  <div id="results">
    <div class="results-header">
      <div class="score-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle id="scoreArc" cx="45" cy="45" r="38" fill="none" stroke="var(--accent)"
            stroke-width="6" stroke-linecap="round"
            stroke-dasharray="238.76" stroke-dashoffset="238.76"
            style="transition: stroke-dashoffset 1s ease"/>
        </svg>
        <div class="score-text">
          <span class="score-num" id="scoreNum">0</span>
          <span class="score-label">match</span>
        </div>
      </div>
      <div class="score-summary">
        <h2>Analysis Complete</h2>
        <p id="summaryText"></p>
      </div>
    </div>

    <div class="cards">
      <!-- Matched Skills -->
      <div class="card">
        <div class="card-title" style="color:var(--accent3)">
          <span class="icon">✓</span> Matched Skills
        </div>
        <div class="tag-list" id="matchedSkills"></div>
      </div>

      <!-- Missing Skills -->
      <div class="card">
        <div class="card-title" style="color:var(--accent2)">
          <span class="icon">△</span> Skill Gaps
        </div>
        <div id="missingSkills"></div>
      </div>

      <!-- Resume Improvements -->
      <div class="card card-full">
        <div class="card-title" style="color:var(--accent)">
          <span class="icon">✎</span> Resume Improvements
        </div>
        <ul class="bullet-list" id="resumeImprovements"></ul>
      </div>

      <!-- Interview Tips -->
      <div class="card card-full">
        <div class="card-title" style="color:#ffc850">
          <span class="icon">◎</span> Interview Prep Tips
        </div>
        <ul class="bullet-list" id="interviewTips"></ul>
      </div>
    </div>
  </div>
</div>

<script>
async function analyze() {
  const resume = document.getElementById('resumeInput').value.trim();
  const jd = document.getElementById('jdInput').value.trim();
  const err = document.getElementById('errorMsg');
  err.className = 'error-msg';

  if (!resume || resume.length < 50) {
    err.textContent = 'Please paste your full resume text (at least 50 characters).';
    err.className = 'error-msg active'; return;
  }
  if (!jd || jd.length < 50) {
    err.textContent = 'Please paste the full job description (at least 50 characters).';
    err.className = 'error-msg active'; return;
  }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('btnText').textContent = 'Analyzing...';
  document.getElementById('loader').className = 'loader active';
  document.getElementById('results').className = '';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ resume_text: resume, job_description: jd })
    });

    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.detail || 'API error');
    }

    const data = await res.json();
    renderResults(data);
  } catch(e) {
    err.textContent = `Error: ${e.message}`;
    err.className = 'error-msg active';
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('btnText').textContent = 'Analyze Match';
    document.getElementById('loader').className = 'loader';
  }
}

function renderResults(data) {
  // Score ring
  const score = data.match_score;
  const circ = 238.76;
  const offset = circ - (circ * score / 100);
  document.getElementById('scoreArc').style.strokeDashoffset = offset;
  document.getElementById('scoreNum').textContent = score;

  // Summary
  document.getElementById('summaryText').textContent = data.summary;

  // Matched skills
  const ms = document.getElementById('matchedSkills');
  ms.innerHTML = data.matched_skills.map(s =>
    `<span class="tag tag-green">${s}</span>`
  ).join('');

  // Missing skills
  const mis = document.getElementById('missingSkills');
  mis.innerHTML = data.missing_skills.map(g => `
    <div class="gap-item">
      <div class="gap-top">
        <span class="gap-skill">${g.skill}</span>
        <span class="importance imp-${g.importance}">${g.importance}</span>
      </div>
      <div class="gap-suggestion">${g.suggestion}</div>
    </div>
  `).join('');

  // Resume improvements
  document.getElementById('resumeImprovements').innerHTML =
    data.resume_improvements.map(i => `<li>${i}</li>`).join('');

  // Interview tips
  document.getElementById('interviewTips').innerHTML =
    data.interview_prep_tips.map(t => `<li>${t}</li>`).join('');

  document.getElementById('results').className = 'active';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
